<nav class="bg-gray-50 w-full shadow-md">
  <div class="items-center px-4 max-w-screen-xl mx-auto md:flex md:px-8">
    <div class="flex items-center justify-between py-3 md:py-5 md:block">
      <a href="/" class="flex items-center space-x-2">
        <img
          src="/assets/template-logo.svg"
          width="140"
          height="40"
          alt="template-logo"
          class="object-contain"
        />
      </a>
      <div class="md:hidden">
        <button
          class="text-blue-900 outline-none p-2 rounded-md focus:ring-2 focus:ring-purple-600"
          (click)="toggleMenu()"
        >
          @if (isMenuOpen()) {
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-6 w-6"
              viewBox="0 0 20 20"
              fill="currentColor"
            >
              <path
                fill-rule="evenodd"
                d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"
                clip-rule="evenodd"
              />
            </svg>
          } @else {
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-6 w-6"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 8h16M4 16h16"
              />
            </svg>
          }
        </button>
      </div>
    </div>
    <div
      [class]="'flex-1 justify-self-center pb-3 mt-8 md:block md:pb-0 md:mt-0 ' + (isMenuOpen() ? 'block' : 'hidden')"
    >
      <ul
        class="justify-center items-center space-y-6 md:flex md:space-x-8 md:space-y-0 font-medium"
      >
        @for (item of navigation; track item.title; let i = $index) {
          <li
            class="relative text-blue-900 hover:text-purple-600 transition-colors duration-300 group"
          >
            <a [href]="item.path" class="block">{{ item.title }}</a>
            <span
              class="absolute left-0 bottom-0 w-0 h-0.5 bg-purple-600 transition-all duration-300 group-hover:w-full"
            ></span>
          </li>
        }
      </ul>
    </div>
    <div class="hidden md:inline-block">
      <a
        href="/get-started"
        class="py-2 px-5 text-white bg-gradient-to-r from-blue-900 to-purple-800 hover:from-purple-800 hover:to-blue-900 rounded-full shadow-lg transform hover:scale-105 transition-all duration-300"
      >
        Get Started
      </a>
    </div>
  </div>
</nav>
