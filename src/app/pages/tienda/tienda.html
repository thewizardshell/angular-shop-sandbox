<!-- tienda.html -->
@if (error()) {
  <div class="bg-red-50 border border-red-200 text-red-600 rounded-lg p-4 mb-4">
    <p>{{ error() }}</p>
    <div class="mt-2 space-x-2">
      <button (click)="onClearError()" class="text-sm underline">Cerrar</button>
      <button (click)="onReload()" class="text-sm underline">Reintentar</button>
    </div>
  </div>
}

<!-- Loading state -->
@if (loading()) {
  <div class="flex items-center justify-center h-40 bg-gray-50 rounded-lg border border-gray-200 text-gray-500 text-base font-medium shadow-inner">
    <div class="flex items-center space-x-2">
      <div class="animate-spin rounded-full h-6 w-6 border-b-2 border-gray-500"></div>
      <span>Cargando productos...</span>
    </div>
  </div>
}

<!-- Lista de productos -->
@if (!loading()) {
  <ul class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 max-w-6xl mx-auto py-6">
    @for (p of products(); track p.id; let idx = $index, e = $even) {
      <li class="group bg-white border border-gray-200 rounded-xl shadow-sm hover:shadow-lg transition-shadow flex flex-col h-full overflow-hidden">
        <a routerLink="/producto/{{p.id}}" class="block h-full">
          <div class="bg-gray-100 flex items-center justify-center h-40">
            <img
              src="{{ p.image }}"
              alt="{{ p.title }}"
              class="w-24 h-24 object-contain transition-transform duration-200 group-hover:scale-105"
            />
          </div>
          <div class="flex-1 flex flex-col justify-between p-4">
            <strong class="text-lg font-semibold text-gray-800 mb-2 line-clamp-2">
              {{ p.title }}
            </strong>
            <span class="text-green-600 font-bold text-base mt-auto">
              {{ p.price | currency: "USD" }}
            </span>
          </div>
        </a>
      </li>
    } @empty {
      <li class="col-span-full bg-red-50 border border-red-200 text-red-600 rounded-lg py-6 text-center font-medium">
        No hay productos disponibles.
      </li>
    }
  </ul>
}
